<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
  <meta name="description" content="Lizheng Wang - PhD student at SJTU. Research on zero-knowledge proofs for machine learning.">
  <title>Lizheng Wang</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
      background: #ffffff;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 17px;
      line-height: 1.7;
      letter-spacing: 0.01em;
      color: #111111;
    }
    h1, h2, h3, h4, h5, h6 { color: #000000; position: relative; letter-spacing: 0; }
    h1 { font-size: 1.8rem; margin: 2rem 0 0.65rem; }
    h2 { font-size: 1.45rem; margin: 1.5rem 0 0.55rem; }
    h3, h4, h5 { font-size: 1.2rem; margin: 1.4rem 0 0.5rem; }
    p { margin: 0.7rem 0; }
    ul, ol { margin: 0.5rem 0 0.9rem; padding-left: 1.2rem; }
    li { margin: 0.28rem 0; }
    strong { font-weight: 700; color: #1f3b5b; }
    a {
      color: #1d4e89;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      -webkit-transition: color 0.2s ease, border-color 0.2s ease;
      transition: color 0.2s ease, border-color 0.2s ease;
    }
    a:hover, a:focus {
      color: #123a67;
      border-bottom-color: currentColor;
    }
    .headerlink {
      position: absolute;
      left: -1.2em;
      color: transparent;
      border-bottom: none;
      -webkit-transition: color 0.15s ease;
      transition: color 0.15s ease;
    }
    .headerlink::after { content: "#"; }
    h2:hover .headerlink,
    h3:hover .headerlink { color: #b0b0b0; }
    .headerlink:hover { color: #1d4e89 !important; border-bottom: none; }
    a[href$=".pdf"]::after {
      content: "PDF";
      display: inline-block;
      margin-left: 5px;
      padding: 1px 5px;
      font-size: 0.7em;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-weight: 600;
      line-height: 1.4;
      color: #b33;
      background: #fdf0f0;
      border: 1px solid #e8c8c8;
      border-radius: 3px;
      vertical-align: middle;
    }
    .contact-note {
      margin: 0.75rem 0 1rem;
      font-style: italic;
      color: #4a4a4a;
      line-height: 1.5;
    }

    /* intro: photo + text */
    .intro {
      display: -webkit-box;
      display: -ms-flexbox;
      display: flex;
      -webkit-box-align: center;
      -ms-flex-align: center;
      align-items: center;
      -webkit-box-pack: justify;
      -ms-flex-pack: justify;
      justify-content: space-between;
      gap: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .intro-text {
      -webkit-box-flex: 1;
      -ms-flex: 1;
      flex: 1;
      min-width: 0;
    }
    .intro-text h2:first-child {
      font-size: 1.85rem;
      margin: 0 0 0.5rem;
    }
    .intro-photo img {
      width: 375px;
      max-width: 32vw;
      height: auto;
      border-radius: 6px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
    }

    @media (max-width: 720px) {
      body { padding: 14px; font-size: 16px; }
      .intro {
        display: block;
        text-align: center;
      }
      .intro-photo img {
        display: block;
        width: 270px;
        max-width: 100%;
        margin: 0 auto 1rem;
      }
      .intro-text { text-align: left; }
    }
  </style>
</head>
<body>

  <section class="intro">
    <div class="intro-text">2134a428a2fded79a4a7b6c70b16c440</div>
    
  </section>
  <main></main>
</body>
</html>
